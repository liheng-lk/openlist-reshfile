version: '3.8'

services:
  openlist-autofile:
    image: liheng6668/openlist-autofile:latest
    container_name: openlist-autofile
    restart: unless-stopped
    ports:
      - "8081:8000"
    volumes:
      - ./config:/config
      # 可选：如果要启用容器可见路径/WebDAV 监听，需要把同一个挂载目录暴露给本容器
      # - /your/webdav/strm:/watch/strm:ro
    environment:
      - TZ=Asia/Shanghai
      - TOOL_PASSWORD=admin888  # 工具自身的登录密码，建议修改
